services:
  dashboard:
    build:
      context: .
    container_name: news-topic-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    container_name: news-topic-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mysql:
    image: mysql:8.4
    container_name: news-topic-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-news_topic_analysis}
      MYSQL_USER: ${MYSQL_USER:-newsapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-newsapp123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
  mysql_data:
